<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Bosque — Seteos Logísticos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --dark:#1e3a2f;
  --green-btn:#1e3a2f;
  --green-light:#e8f0e4;
  --green-acc:#3a7a52;
  --op-bg:#2d5c3e;
  --op-fg:#fff;
  --border:#c8d8c0;
  --border2:#dde8d8;
  --bg:#f5f7f2;
  --bg2:#fff;
  --text:#1a2e20;
  --text2:#3a5040;
  --text3:#6a8070;
  --filter-bg:#eef3e8;
  --pending-bg:#fff8e6;
  --pending-border:#e6a817;
  --pending-text:#7a5500;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}

.header{background:var(--dark);padding:1rem;display:flex;justify-content:space-between;align-items:center}
.header-title{color:#fff;font-weight:600}
.header-cycle{color:#a8d4b8;font-size:12px}

.today-bar{background:var(--dark);padding:.5rem 1rem;color:#fff;display:flex;gap:10px;align-items:center}
.today-badge{background:var(--green-acc);padding:3px 10px;border-radius:20px;font-weight:700}
.today-date{margin-left:auto;color:#a8d4b8;font-size:12px}

.filters{display:flex;gap:10px;padding:1rem;background:var(--filter-bg);flex-wrap:wrap}
select,input{padding:6px;border-radius:6px;border:1px solid var(--border)}

.status{padding:.5rem 1rem;font-size:11px;color:var(--text3)}

.table-wrap{padding:1rem}
table{width:100%;border-collapse:collapse;background:#fff}
th{background:var(--green-btn);color:#fff;padding:10px;font-size:11px;text-transform:uppercase}
td{padding:10px;border-bottom:1px solid var(--border2);font-size:13px}

.ok-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:#fff}
.ok-btn.done{background:var(--green-acc);color:#fff}

.pending-section{margin:1rem;border:2px solid var(--pending-border);display:none;border-radius:8px;overflow:hidden}
.pending-section.visible{display:block}
.pending-header{background:var(--pending-border);color:#fff;padding:.5rem 1rem;font-weight:700}
.pending-table td{padding:8px;background:var(--pending-bg);border-bottom:1px solid #f0d88a;font-size:12px}
</style>
</head>

<body>

<div class="header">
  <div style="color:#fff;font-weight:700">Portal Bosque</div>
  <div class="header-cycle">Seteos Logísticos</div>
</div>

<div class="today-bar">
  <span>Hoy</span>
  <span class="today-badge" id="today-badge">—</span>
  <span class="today-date" id="today-date">—</span>
</div>

<div class="filters">
  <select id="sel-dia" onchange="render()"><option value="">Hoy</option></select>
  <select id="sel-resp" onchange="render()"><option value="">Todos</option></select>
  <input id="inp-esp" placeholder="Espacio" oninput="render()">
</div>

<div class="status" id="status-text">Cargando...</div>

<div class="pending-section" id="pending-section">
  <div class="pending-header">Pendientes de ayer</div>
  <table id="pending-table"></table>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Día</th>
        <th>Resp</th>
        <th>Horario</th>
        <th>Espacio</th>
        <th>Necesidad</th>
        <th>Info</th>
        <th>Notas</th>
        <th>OK</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAjbZFpNcEopTvKwlp2Nn6EpFWNPAf3hMK0vc_NRM5K3NhSTe73DsHUjEV3YjKGWT4auUjQ3kXpucf/pub?gid=0&single=true&output=csv";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykJx6LauaXrGkUnmocIeNinK5fHDxL_zFlk2Os32s3yUiC42CnIzlp-pTSOUeqBuo/exec";

let DATA = [];
let MAP = [];

function norm(s){return (s||"").toUpperCase().normalize("NFD").replace(/\p{Diacritic}/gu,"");}

function today(){
  return ["DOMINGO","LUNES","MARTES","MIERCOLES","JUEVES","VIERNES","SABADO"][new Date().getDay()];
}

function yesterday(){
  const d=new Date();d.setDate(d.getDate()-1);
  return ["DOMINGO","LUNES","MARTES","MIERCOLES","JUEVES","VIERNES","SABADO"][d.getDay()];
}

async function load(){
  const r=await fetch(CSV_URL+"?t="+Date.now());
  const t=await r.text();
  parse(t);
  render();
  pending();
}

function parse(t){
  const lines=t.split("\n");
  DATA=[];MAP=[];
  let last="";
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(",");
    if(!c[3]) continue;
    if(c[0]) last=c[0];
    DATA.push({
      dia:last,
      diaN:norm(last),
      resp:c[1],
      horario:c[2],
      esp:c[3],
      nec:c[4],
      info:c[5],
      notas:c[6],
      ok:c[7]==="SI"
    });
    MAP.push(i+1);
  }
}

function render(){
  const dia=document.getElementById("sel-dia").value||today();
  const resp=document.getElementById("sel-resp").value;
  const esp=document.getElementById("inp-esp").value.toLowerCase();

  const f=DATA.filter(r=>
    (!dia||r.diaN===dia)&&
    (!resp||r.resp===resp)&&
    (!esp||r.esp.toLowerCase().includes(esp))
  );

  document.getElementById("tbody").innerHTML=f.map((r,i)=>`
    <tr>
      <td>${r.dia}</td>
      <td>${r.resp||"-"}</td>
      <td>${r.horario||"-"}</td>
      <td>${r.esp}</td>
      <td>${r.nec||""}</td>
      <td>${r.info||""}</td>
      <td>${r.notas||""}</td>
      <td><button class="ok-btn ${r.ok?'done':''}" onclick="toggle(${i})">${r.ok?'OK':'-'}</button></td>
    </tr>
  `).join("");

  document.getElementById("today-badge").textContent=today();
  document.getElementById("today-date").textContent=new Date().toLocaleDateString("es-UY");
}

function pending(){
  const y=yesterday();
  const p=DATA.filter(r=>r.diaN===y&&!r.ok);
  const sec=document.getElementById("pending-section");
  const tb=document.getElementById("pending-table");

  if(!p.length){sec.classList.remove("visible");return;}
  sec.classList.add("visible");

  tb.innerHTML=p.map(r=>`
    <tr>
      <td>${r.dia} - ${r.esp}</td>
      <td>${r.resp}</td>
      <td>${r.nec||""}</td>
    </tr>
  `).join("");
}

async function toggle(i){
  const r=DATA[i];
  r.ok=!r.ok;

  await fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({row:MAP[i],value:r.ok?"SI":""})
  });

  render();
  pending();
}

load();

</script>

</body>
</html>
