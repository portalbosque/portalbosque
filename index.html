<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Bosque — Seteos Logísticos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* =========================
   TU CSS ORIGINAL (INTACTO)
========================= */
body { margin:0; font-family:'DM Sans', sans-serif; background:#f5f7f2; color:#1a2e20; }

.header {
  background:#1e3a2f;
  padding:1rem 1.5rem;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header-title { font-weight:600; }
.status { padding:10px 1.5rem; font-size:12px; }

.table-wrap { padding:1rem 1.5rem; }

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#1e3a2f;
  color:white;
  text-align:left;
  font-size:11px;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:13px;
}

.ok-btn {
  padding:6px 12px;
  border-radius:20px;
  border:1px solid #ccc;
  cursor:pointer;
  font-size:12px;
  background:white;
}

.ok-btn.done {
  background:#3a7a52;
  color:white;
  border-color:#3a7a52;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-title">Portal Bosque — Seteos Logísticos</div>
</div>

<div class="status" id="status">Cargando...</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Día</th>
        <th>Responsable</th>
        <th>Horario</th>
        <th>Espacio</th>
        <th>Necesidad</th>
        <th>Info</th>
        <th>Notas</th>
        <th>OK</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
/* =========================
   🔵 BACKEND
========================= */
const APPS_SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbykJx6LauaXrGkUnmocIeNinK5fHDxL_zFlk2Os32s3yUiC42CnIzlp-pTSOUeqBuo/exec';

let DATA = [];
let ROWS = [];

function normalizar(t){
  return (t||'').toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'');
}

/* =========================
   🔵 CARGAR DATOS
========================= */
async function load() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?getData=true');
    const json = await res.json();

    DATA = [];
    ROWS = [];

    let lastDia = '';

    for (let i=1;i<json.data.length;i++){
      const r = json.data[i];
      if(!r || r.length<4) continue;

      let [dia,resp,horario,espacio,nec,info,notas,ok] =
        r.map(e => (e||'').toString().trim());

      if(dia) lastDia = dia; else dia = lastDia;
      if(!espacio) continue;

      DATA.push({
        dia,
        resp,
        horario,
        espacio,
        nec,
        info,
        notas,
        ok: (ok||'').toUpperCase()==='SI'
      });

      ROWS.push(i+1);
    }

    render();
    document.getElementById('status').innerText = 'Sincronizado ✔️';

  } catch(e){
    console.error(e);
    document.getElementById('status').innerText = 'Error de conexión';
  }
}

/* =========================
   🟢 TOGGLE OK
========================= */
async function toggle(i){
  const row = DATA[i];
  const sheetRow = ROWS[i];
  const newVal = row.ok ? '' : 'SI';

  try {
    const res = await fetch(
      APPS_SCRIPT_URL + `?row=${sheetRow}&value=${newVal}`
    );

    const json = await res.json();
    if(!json.ok) throw new Error();

    row.ok = !row.ok;
    await load();

  } catch(e){
    alert('Error al guardar');
  }
}

/* =========================
   🔵 RENDER
========================= */
function render(){
  const tbody = document.getElementById('tbody');

  tbody.innerHTML = DATA.map((r,i)=>`
    <tr>
      <td>${r.dia}</td>
      <td>${r.resp}</td>
      <td>${r.horario}</td>
      <td>${r.espacio}</td>
      <td>${r.nec}</td>
      <td>${r.info}</td>
      <td>${r.notas}</td>
      <td>
        <button class="ok-btn ${r.ok?'done':''}" onclick="toggle(${i})">
          ${r.ok?'OK':'Pendiente'}
        </button>
      </td>
    </tr>
  `).join('');
}

/* =========================
   AUTO START
========================= */
load();
setInterval(load, 60000);
</script>

</body>
</html>
