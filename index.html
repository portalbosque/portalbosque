<script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQAjbZFpNcEopTvKwlp2Nn6EpFWNPAf3hMK0vc_NRM5K3NhSTe73DsHUjEV3YjKGWT4auUjQ3kXpucf/pub?gid=0&single=true&output=csv';

    let rawData = [];
    let lastDia = "";
    let lastResp = "";
    let lastHora = "";

    async function load() {
        Papa.parse(url, {
            download: true,
            complete: function(res) {
                // Procesamos los datos para rellenar los huecos en blanco (celdas combinadas)
                const processed = [];
                const rows = res.data.slice(1); // Ignorar cabecera

                rows.forEach(r => {
                    // Si la fila está totalmente vacía, la ignoramos
                    if (r.length < 4 || !r[3]) return; 

                    // Lógica de "memoria" para celdas vacías
                    if (r[0] && r[0].trim() !== "") lastDia = r[0];
                    if (r[1] && r[1].trim() !== "") lastResp = r[1];
                    if (r[2] && r[2].trim() !== "") lastHora = r[2];

                    processed.push([
                        lastDia,    // Día
                        lastResp,   // Responsable
                        lastHora,   // Horario
                        r[3],       // Espacio
                        r[4],       // Necesidad
                        r[5],       // Info
                        r[6]        // Notas
                    ]);
                });

                rawData = processed;
                draw(rawData);
                fill(rawData);
            }
        });
    }

    function draw(data) {
        const container = document.getElementById('content');
        container.innerHTML = '';
        data.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.id = 'r' + i;
            tr.innerHTML = `
                <td><b>${r[0] || ''}</b></td>
                <td><b>${r[1] || ''}</b></td>
                <td>${r[2] || ''}</td>
                <td style="text-transform:uppercase"><b>${r[3] || ''}</b></td>
                <td class="col-necesidad">${r[4] || ''}</td>
                <td>${r[5] ? '<span class="badge">'+r[5]+'</span>' : ''}</td>
                <td class="col-notas">${r[6] || ''}</td>
                <td class="col-check"><div class="check-btn" onclick="done(${i})"></div></td>
            `;
            container.appendChild(tr);
        });
    }

    function done(i) { document.getElementById('r'+i).classList.toggle('completed'); }

    function fill(data) {
        const make = (id, idx) => {
            const s = document.getElementById(id);
            if (s.options.length > 1) return; // Evitar duplicar filtros
            const opts = [...new Set(data.map(r => r[idx]))].filter(v => v && v.trim() !== "");
            opts.forEach(v => { s.innerHTML += `<option value="${v}">${v}</option>`; });
            s.onchange = filter;
        };
        make('f0', 0); make('f1', 1); make('f3', 3);
    }

    function filter() {
        const v0 = document.getElementById('f0').value;
        const v1 = document.getElementById('f1').value;
        const v3 = document.getElementById('f3').value;
        const filtered = rawData.filter(r => 
            (!v0 || r[0] === v0) && (!v1 || r[1] === v1) && (!v3 || r[3] === v3)
        );
        draw(filtered);
    }

    window.onload = load;
</script>
