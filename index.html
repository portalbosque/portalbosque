<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQAjbZFpNcEopTvKwlp2Nn6EpFWNPAf3hMK0vc_NRM5K3NhSTe73DsHUjEV3YjKGWT4auUjQ3kXpucf/pub?output=csv';

let ALL_DATA = [];

const DIAS_ORDER = ['LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO','DOMINGO'];

const DIAS_LABEL = {
  LUNES: "Lunes",
  MARTES: "Martes",
  MIERCOLES: "Miércoles",
  JUEVES: "Jueves",
  VIERNES: "Viernes",
  SABADO: "Sábado",
  DOMINGO: "Domingo"
};

function normalizar(s) {
  return (s || '')
    .toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  let lastDia = '';

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    const cols = splitCSVLine(line);
    let [dia, resp, horario, espacio, necesidad, info, notas] = cols.map(c => c.trim());

    if (dia) lastDia = dia;
    else dia = lastDia;

    if (!espacio) continue;

    rows.push({
      dia,
      diaNorm: normalizar(dia),
      resp: resp || '',
      horario: horario || '',
      espacio,
      necesidad: necesidad || '',
      info: info || '',
      notas: notas || ''
    });
  }

  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];

    if (ch === '"') inQ = !inQ;
    else if (ch === ',' && !inQ) {
      result.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }

  result.push(cur);
  return result;
}

async function fetchData() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();

    ALL_DATA = parseCSV(text);

    const diasEnDatos = new Set(ALL_DATA.map(r => r.diaNorm));

    const sel = document.getElementById('sel-dia');

    // 🔥 FIX CLAVE: limpiar antes de reconstruir
    sel.innerHTML = '<option value="">Todos los días</option>';

    DIAS_ORDER.forEach(d => {
      if (!diasEnDatos.has(d)) return;

      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = DIAS_LABEL[d];
      sel.appendChild(opt);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('table').style.display = 'table';

    render();

  } catch (e) {
    console.error('Error:', e);
  }
}

function respClass(r) {
  const k = (r || '').toLowerCase().trim();
  if (k === 'heber') return 'resp-heber';
  if (k === 'daniel') return 'resp-daniel';
  if (k === 'nahuel') return 'resp-nahuel';
  if (k === 'dani') return 'resp-dani';
  return '';
}

function initials(n) {
  return n ? n.slice(0,2).toUpperCase() : '?';
}

function render() {
  const dia = normalizar(document.getElementById('sel-dia').value);
  const resp = document.getElementById('inp-resp').value.toLowerCase();
  const esp = document.getElementById('inp-esp').value.toLowerCase();

  let filtered = ALL_DATA.filter(r => {
    if (dia && r.diaNorm !== dia) return false;
    if (resp && !r.resp.toLowerCase().includes(resp)) return false;
    if (esp && !r.espacio.toLowerCase().includes(esp)) return false;
    return true;
  });

  // 🔥 ORDEN PRO (día + horario)
  filtered.sort((a, b) => {
    const d = DIAS_ORDER.indexOf(a.diaNorm) - DIAS_ORDER.indexOf(b.diaNorm);
    if (d !== 0) return d;
    return (a.horario || '').localeCompare(b.horario || '');
  });

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const rc = respClass(r.resp);

    return `<tr>
      <td>${DIAS_LABEL[r.diaNorm]}</td>
      <td>${r.resp}</td>
      <td>${r.horario}</td>
      <td>${r.espacio}</td>
      <td>${r.necesidad}</td>
      <td>${r.info}</td>
      <td>${r.notas}</td>
    </tr>`;
  }).join('');
}

fetchData();

// 🔁 refresco automático
setInterval(fetchData, 5 * 60 * 1000);
</script>
